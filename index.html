<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title></title>
</head>
<body>

<h2>โค้ด Hyaku Asura</h2>
<h3>อย่ากดเล่นเยอะเดี๋ยว api request ผมหมด</h3>

<label>Master Key: <input type="password" id="apiKey" placeholder="fuck eevee..."></label><br><br>

<button onclick="โหลด()">โหลด</button>
<button onclick="บันทึก()">เซฟ</button>
<span id="สถานะ"></span>

<br><br>
<div id="หน้าหลัก" style="display:none">

  <h3>ทั้งหมด</h3>
  <table border="1" cellpadding="6" cellspacing="0" id="ตาราง">
    <thead><tr><th>ชื่อ</th><th>ข้อมูล</th><th>จัดการ</th></tr></thead>
    <tbody id="แถว"></tbody>
  </table>

  <br>
  <button onclick="สลับเพิ่ม()">+ เพิ่ม</button>

  <div id="กล่องเพิ่ม" style="display:none;margin-top:10px">
    <label>ชื่อ: <input id="ชื่อใหม่" placeholder="เช่น NewEvent"></label><br><br>
    <p>แก้ไข:</p>
    <textarea id="แก้ไขโคลน" rows="12" cols="60" oninput="ตรวจJSON('แก้ไขโคลน','สถานะโคลน')"></textarea>
    <br><span id="สถานะโคลน"></span><br>
    <button onclick="ยืนยันเพิ่ม()">ยืนยัน</button>
    <button onclick="รีเซ็ตโคลน()">รีเซ็ต</button>
  </div>

  <br><br>
  <h3>Raw JSON</h3>
  <textarea id="JSONดิบ" rows="15" cols="60" oninput="ตรวจJSON('JSONดิบ','สถานะดิบ')"></textarea>
  <br><span id="สถานะดิบ"></span>

</div>

<div id="กล่องแก้ไขแถว" style="display:none;margin-top:10px;border:1px solid #aaa;padding:10px">
  <p>กำลังแก้ไข: <strong id="ชื่อแก้ไข"></strong></p>
  <textarea id="แก้ไขแถว" rows="10" cols="60" oninput="ตรวจJSON('แก้ไขแถว','สถานะแก้ไขแถว')"></textarea>
  <br><span id="สถานะแก้ไขแถว"></span><br>
  <button onclick="ยืนยันแก้ไข()">ยืนยัน</button>
  <button onclick="ยกเลิกแก้ไข()">ยกเลิก</button>
</div>

<script>
const BIN_ID = "6a27f0b0da38895dfe9f9b20";
let ข้อมูล = null;
let กำลังแก้ไขคีย์ = null;
let เพิ่มเปิดอยู่ = false;

function getKey() { return document.getElementById('apiKey').value.trim(); }

function ตรวจJSON(editorId, statusId) {
  try { JSON.parse(document.getElementById(editorId).value); document.getElementById(statusId).textContent = "✓ JSON ถูกต้อง"; }
  catch(e) { document.getElementById(statusId).textContent = "✗ ผิดพลาด: " + e.message; }
}

async function โหลด() {
  const key = getKey();
  if (!key) { alert("กรุณาใส่รหัส API"); return; }
  document.getElementById('สถานะ').textContent = "กำลังโหลด…";
  try {
    const r = await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID + "/latest", { headers: { "X-Master-Key": key } });
    if (!r.ok) throw new Error("HTTP " + r.status);
    ข้อมูล = (await r.json()).record;
    document.getElementById('สถานะ').textContent = "✓ โหลดสำเร็จ";
    อัปเดตตาราง();
    อัปเดตดิบ();
    document.getElementById('หน้าหลัก').style.display = '';
  } catch(e) { document.getElementById('สถานะ').textContent = "✗ ผิดพลาด: " + e.message; }
}

async function บันทึก() {
  const key = getKey();
  if (!key) { alert("กรุณาใส่รหัส API"); return; }
  let toSave = ข้อมูล;
  const rawVal = document.getElementById('JSONดิบ').value;
  try { toSave = JSON.parse(rawVal); } catch { alert("JSON ดิบผิดพลาด กรุณาแก้ไขก่อนบันทึก"); return; }
  document.getElementById('สถานะ').textContent = "กำลังบันทึก…";
  try {
    const r = await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": key },
      body: JSON.stringify(toSave)
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    ข้อมูล = toSave;
    document.getElementById('สถานะ').textContent = "✓ บันทึกสำเร็จ";
    อัปเดตตาราง();
  } catch(e) { document.getElementById('สถานะ').textContent = "✗ บันทึกไม่สำเร็จ: " + e.message; }
}

function อัปเดตตาราง() {
  const tbody = document.getElementById('แถว');
  if (!ข้อมูล || typeof ข้อมูล !== 'object') { tbody.innerHTML = '<tr><td colspan="3">ไม่มีข้อมูล</td></tr>'; return; }
  tbody.innerHTML = Object.entries(ข้อมูล).map(([k, v]) => {
    const preview = JSON.stringify(v).slice(0, 60) + (JSON.stringify(v).length > 60 ? '…' : '');
    return `<tr>
      <td><strong>${esc(k)}</strong></td>
      <td style="font-family:monospace;font-size:12px">${esc(preview)}</td>
      <td>
        <button onclick="เปิดแก้ไข('${escAttr(k)}')">แก้ไข</button>
        <button onclick="ลบ('${escAttr(k)}')">ลบ</button>
      </td>
    </tr>`;
  }).join('');
}

function อัปเดตดิบ() {
  document.getElementById('JSONดิบ').value = JSON.stringify(ข้อมูล, null, 2);
}

function เปิดแก้ไข(k) {
  กำลังแก้ไขคีย์ = k;
  document.getElementById('ชื่อแก้ไข').textContent = k;
  document.getElementById('แก้ไขแถว').value = JSON.stringify(ข้อมูล[k], null, 2);
  document.getElementById('สถานะแก้ไขแถว').textContent = '';
  document.getElementById('กล่องแก้ไขแถว').style.display = '';
  document.getElementById('กล่องแก้ไขแถว').scrollIntoView({ behavior: 'smooth' });
}

function ยืนยันแก้ไข() {
  try {
    ข้อมูล[กำลังแก้ไขคีย์] = JSON.parse(document.getElementById('แก้ไขแถว').value);
    ยกเลิกแก้ไข();
    อัปเดตตาราง();
    อัปเดตดิบ();
    alert("อัปเดตสำเร็จ (อย่าลืมกด บันทึก)");
  } catch { alert("JSON ผิดพลาด"); }
}

function ยกเลิกแก้ไข() {
  กำลังแก้ไขคีย์ = null;
  document.getElementById('กล่องแก้ไขแถว').style.display = 'none';
}

function ลบ(k) {
  if (!confirm('ลบ "' + k + '" ใช่ไหม?')) return;
  delete ข้อมูล[k];
  อัปเดตตาราง();
  อัปเดตดิบ();
}

function สลับเพิ่ม() {
  เพิ่มเปิดอยู่ = !เพิ่มเปิดอยู่;
  document.getElementById('กล่องเพิ่ม').style.display = เพิ่มเปิดอยู่ ? '' : 'none';
  if (เพิ่มเปิดอยู่) รีเซ็ตโคลน();
}

function รีเซ็ตโคลน() {
  const keys = ข้อมูล ? Object.keys(ข้อมูล) : [];
  const tmpl = keys.length > 0 ? JSON.parse(JSON.stringify(ข้อมูล[keys[0]])) : {};
  document.getElementById('แก้ไขโคลน').value = JSON.stringify(tmpl, null, 2);
  document.getElementById('สถานะโคลน').textContent = '';
}

function ยืนยันเพิ่ม() {
  const name = document.getElementById('ชื่อใหม่').value.trim();
  if (!name) { alert("กรุณาใส่ชื่อรายการ"); return; }
  if (ข้อมูล[name] !== undefined) { alert("ชื่อนี้มีอยู่แล้ว"); return; }
  try {
    ข้อมูล[name] = JSON.parse(document.getElementById('แก้ไขโคลน').value);
    document.getElementById('ชื่อใหม่').value = '';
    เพิ่มเปิดอยู่ = false;
    document.getElementById('กล่องเพิ่ม').style.display = 'none';
    อัปเดตตาราง();
    อัปเดตดิบ();
    alert('เพิ่ม "' + name + '" สำเร็จ (อย่าลืมกด บันทึก)');
  } catch { alert("JSON ผิดพลาด กรุณาแก้ไขก่อน"); }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/'/g,"\\'"); }
</script>

</body>
</html>
